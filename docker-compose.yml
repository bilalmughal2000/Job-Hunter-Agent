# AI Job Hunter — local development / demo stack.
# Usage: cp .env.example .env && docker compose up --build

services:
  postgres:
    image: postgres:16-alpine
    container_name: ajh-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: jobhunter
      POSTGRES_PASSWORD: jobhunter
      POSTGRES_DB: jobhunter
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U jobhunter']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ajh-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: ajh-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://jobhunter:jobhunter@postgres:5432/jobhunter?schema=public
      REDIS_URL: redis://redis:6379
      CORS_ORIGIN: http://localhost:8080
    env_file:
      - .env
    ports:
      - '3000:3000'

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    container_name: ajh-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - '8080:80'

volumes:
  pgdata:
  redisdata:
