server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback — Angular router handles client-side routes (Phase 7).
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Proxy API calls to the backend service on the compose network.
  # Using Docker's embedded DNS (127.0.0.11) + a variable defers upstream
  # resolution to request time, so nginx still starts if `backend` is absent
  # (e.g. the image run standalone).
  location /api/ {
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $backend_upstream http://backend:3000;
    proxy_pass $backend_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
