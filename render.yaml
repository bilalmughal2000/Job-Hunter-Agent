# Render Blueprint — deploys the whole stack outside Pakistan (so Telegram works).
# In Render: New → Blueprint → connect this repo. Then set the `sync: false`
# secrets in the dashboard (AI/JSearch/Telegram/email keys).
# Docs: https://render.com/docs/blueprint-spec

databases:
  - name: ajh-postgres
    plan: free
    databaseName: jobhunter
    user: jobhunter

services:
  # ── Backend API (Docker; runs `prisma migrate deploy` on start) ──
  - type: web
    name: ajh-backend
    runtime: docker
    dockerfilePath: ./docker/backend.Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: ajh-postgres
          property: connectionString
      - key: JWT_SECRET
        generateValue: true # Render generates a strong secret
      - key: CORS_ORIGIN
        fromService:
          type: web
          name: ajh-frontend
          property: host
      # AI (Groq/OpenAI-compatible) — set the key in the dashboard
      - key: AI_PROVIDER
        value: openai-compatible
      - key: AI_BASE_URL
        value: https://api.groq.com/openai/v1
      - key: AI_MODEL
        value: llama-3.3-70b-versatile
      - key: AI_API_KEY
        sync: false
      # Job aggregator (JSearch / RapidAPI)
      - key: JSEARCH_API_KEY
        sync: false
      - key: JSEARCH_HOST
        value: jsearch.p.rapidapi.com
      # Telegram (works from Render — outside Pakistan)
      - key: TELEGRAM_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      # Email (optional)
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_PORT
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASSWORD
        sync: false
      - key: EMAIL_FROM
        sync: false

  # ── Frontend (Angular static site; proxies /api to the backend) ──
  - type: web
    name: ajh-frontend
    runtime: static
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: ./frontend/dist/frontend/browser
    routes:
      # Proxy API calls to the backend (same-origin, so the app's '/api/v1' works).
      - type: rewrite
        source: /api/*
        destination: https://ajh-backend.onrender.com/api/:splat
      # SPA fallback for client-side routes.
      - type: rewrite
        source: /*
        destination: /index.html
